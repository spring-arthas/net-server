
# 监听IP 30.7.80.22
SERVER.IP = 172.21.32.54
#SERVER.IP = 192.168.2.105

# 设置ByteBuffer大小 11168，用于设置socketChannel.read(byteBuffer)中byteBuffer大小
BYTE.BUFFER = 40000

# 设置socket接收缓冲区大小
SOCKET.RECEIVE.BUFFER.SIZE = 32500

# 设置socket发送缓冲区大小
SOCKET.SEND.BUFFER.SIZE = 32500

# 设置文件下载时文件每次发送文件流大小
DOWNLOAD.SEND.BYTE.BUFFER = 32500

# 设置Write Event写事件处理时间(ms为单位)
SELECTOR.WRITE.EVENT.HANDLER.TIME = 10000

# 设置socket超时
SOCKET.TIMEOUT = 3000

# 设置socket重连次数
SOCKET.RECONNECTED.COUNT = 5

# 设置selector循环被阻塞秒数
SELECTOR.POLL.TIMEOUT = 2000

# 最大写入次数
WRITE.MAX.WAIT.COUNT = 5

# NIO 原生端口
NIO.TEXT.PORT = 10086
NIO.FILE.UPLOAD.PORT = 10087
NIO.FILE.DOWNLOAD.PORT = 10088
NIO.FILE.RESUME.UPLOAD.PORT = 10089
NIO.FILE.RESUME.DOWNLOAD.PORT = 10090
NIO.WEBSOCKET.PORT = 10089

# NIO 文件保存路径
NIO.FILE.BASE.PATH.WINDOWS = D:\\nio\\file\\
NIO.FILE.BASE.PATH.LINUX.MAC = /usr/local/nio/file/

# 基于Netty的聊天以及webSocket协议,以及文件服务端口
NETTY.SERVER.PROTOCOL.PORT = 60100,60101,60102

# 文件上传配置
# 单连接上传速率限制（字节/秒），默认 2MB/s
FILE.UPLOAD.PER.CONNECTION.RATE.BPS = 2097152

# 全局总上传速率限制（字节/秒），默认 20MB/s
FILE.UPLOAD.GLOBAL.RATE.BPS = 20971520

# 最大并发上传数，默认 30
FILE.UPLOAD.MAX.CONCURRENT.UPLOADS = 30

# 是否启用动态速率调整，默认 false
FILE.UPLOAD.ENABLE.DYNAMIC.RATE.ADJUSTMENT = false

# 令牌桶容量倍数，默认 2
FILE.UPLOAD.BUCKET.CAPACITY.MULTIPLIER = 2
